# ==========================================================
# Sistema Copa do Mundo 2026 - Configuração da aplicação
# ==========================================================

# Porta do servidor (o frontend React espera o backend em localhost:8080)
server.port=8080

# ----------------------------------------------------------
# Banco de dados H2 (DESENVOLVIMENTO)
# ----------------------------------------------------------
# Banco em memória, recriado a cada execução. Ideal para desenvolvimento/testes.
spring.datasource.url=jdbc:h2:mem:copa2026db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2, acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate cria/recria as tabelas automaticamente a partir das entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ----------------------------------------------------------
# PRODUÇÃO (MySQL ou PostgreSQL) - exemplo de configuração
# ----------------------------------------------------------
# Para usar em produção, comente as propriedades H2 acima e descomente
# as opções abaixo (lembre de adicionar a dependência do driver no pom.xml):
#
# --- MySQL ---
# spring.datasource.url=jdbc:mysql://localhost:3306/copa2026db
# spring.datasource.username=root
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.hibernate.ddl-auto=update
#
# --- PostgreSQL ---
# spring.datasource.url=jdbc:postgresql://localhost:5432/copa2026db
# spring.datasource.username=postgres
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ----------------------------------------------------------
# Logs (ajuda a depurar requisições e SQL durante o desenvolvimento)
# ----------------------------------------------------------
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
